<!DOCTYPE html>
<html>
    <head>
        <title>
            practice html
        </title>
        <style>
        body { font-family: sans-serif; padding: 20px; }
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { padding: 8px; width: 250px; border: 1px solid #ccc; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; }
        #displayField { padding: 10px; border: 1px dashed #666; background: #f9f9f9; min-height: 20px; }
        </style>
    </head>
    <div class="search-container">
        <!-- The Search Input -->
        <input type="text" id="searchInput" placeholder="Type something here...">
        
        <!-- The Search Button -->
        <button onclick="updateDisplay()">Search</button>
    </div>

    <!-- The Display Field -->
    <p><strong>Result:</strong></p>
    <div id="displayField">Your results will appear here.</div>

    <script>
        // Function to take input value and show it in the display field
        function updateDisplay() {
            const inputVal = document.getElementById("searchInput").value;
            const display = document.getElementById("displayField");
            
            if (inputVal.trim() !== "") {
                display.innerText = "You searched for: " + inputVal;
            } else {
                display.innerText = "Please enter text to search.";
            }
        }
    </script>

</html>
